services:
  - type: web
    name: xiangbang-baojingyun
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: xiangbang-baojingyun-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ENTERPRISE_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: INTEGRATION_MODE
        value: mock

databases:
  - name: xiangbang-baojingyun-db
    plan: free
    databaseName: xiangbang_baojingyun
    user: xiangbang
