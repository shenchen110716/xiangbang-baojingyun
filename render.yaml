services:
  - type: web
    name: xiangbang-baojingyun
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Set once per environment in the Render dashboard. Rotating it makes
      # existing encrypted ID numbers undecryptable, so it must not be
      # regenerated per deploy.
      - key: ID_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENTERPRISE_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: INTEGRATION_MODE
        value: mock
